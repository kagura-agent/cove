name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Rebuild better-sqlite3
        run: cd node_modules/better-sqlite3 && npx --yes prebuild-install || npx --yes node-gyp rebuild

      - name: Build shared
        run: pnpm -r --filter @cove/shared build

      - name: Type check
        run: pnpm -r --filter @cove/server exec tsc --noEmit

      - name: Test
        run: pnpm -r --filter @cove/server exec vitest run
