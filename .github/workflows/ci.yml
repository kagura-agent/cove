name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build native addons
        run: cd node_modules/better-sqlite3 && npx --yes prebuild-install || npx --yes node-gyp rebuild

      - name: Build all packages
        run: pnpm -r build

      - name: Type check
        run: pnpm -r exec tsc --noEmit

      - name: Test
        run: pnpm -r --filter @cove/server exec vitest run

      - name: Bundle check (verify deploy bundle builds)
        run: |
          npx esbuild packages/server/dist/index.js \
            --bundle --platform=node --format=esm \
            --outfile=/dev/null \
            --external:better-sqlite3 --external:ws \
            --alias:@cove/shared=./packages/shared/src/index.ts

      - name: Notify Cove on CI failure
        if: failure() && github.event_name == 'pull_request'
        env:
          WEBHOOK_URL: ${{ secrets.COVE_DEV_WEBHOOK_URL }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          jq -nc --arg pr "#$PR_NUMBER" --arg title "$PR_TITLE" --arg url "$RUN_URL" \
            '{content: "❌ CI failed on PR \($pr): \($title)\n\($url)", username: "GitHub CI"}' \
          | curl -sf -X POST "$WEBHOOK_URL" -H "Content-Type: application/json" -d @-
