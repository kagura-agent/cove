name: Notify Cove on issue close

on:
  issues:
    types: [closed]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for staging deploy to complete
        run: sleep 120
      - name: Send issue close notification to Cove
        run: |
          curl -s -X POST "${{ secrets.COVE_PRODUCT_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"✅ Issue #${{ github.event.issue.number }} closed: ${{ github.event.issue.title }}\", \"username\": \"GitHub\"}"
