<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Cove 🏝️</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏝️</text></svg>">
</head>
<body>
  <div id="app">
    <!-- Mobile header (hidden on desktop) -->
    <header id="mobile-header">
      <button id="sidebar-toggle" aria-label="Toggle channels">☰</button>
      <h1 id="mobile-title">Cove 🏝️</h1>
    </header>

    <!-- Sidebar -->
    <aside id="sidebar">
      <div id="sidebar-header">
        <h1>🏝️ Cove</h1>
        <p class="subtitle">island scenes</p>
      </div>
      <nav id="channel-list" aria-label="Channels">
        <div class="loading">Loading scenes…</div>
      </nav>
    </aside>

    <!-- Overlay for mobile sidebar -->
    <div id="sidebar-overlay"></div>

    <!-- Main chat area -->
    <main id="chat-area">
      <div id="chat-header">
        <span id="channel-icon">🏝️</span>
        <div>
          <h2 id="channel-name">Welcome</h2>
          <p id="channel-topic">Pick a scene to start chatting</p>
        </div>
      </div>

      <div id="messages">
        <div class="empty-state">
          <span class="empty-emoji">🌴</span>
          <p>Select a scene from the sidebar</p>
        </div>
      </div>

      <form id="message-form" class="hidden">
        <input
          type="text"
          id="message-input"
          placeholder="Say something…"
          autocomplete="off"
          maxlength="2000"
        />
        <button type="submit" id="send-btn" aria-label="Send">➤</button>
      </form>
    </main>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
