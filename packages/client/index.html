<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Cove 🏝️</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏝️</text></svg>">
</head>
<body>
  <div id="app">
    <!-- Mobile header (hidden on desktop) -->
    <header id="mobile-header">
      <button id="sidebar-toggle" aria-label="Toggle channels">☰</button>
      <h1 id="mobile-title" style="flex:1">Cove 🏝️</h1>
      <button id="clear-btn-mobile" title="Clear messages" style="background:none;border:none;color:var(--text-muted);font-size:18px;cursor:pointer;padding:4px 8px;">🗑️</button>
    </header>

    <!-- Sidebar -->
    <aside id="sidebar">
      <div id="sidebar-header">
        <h1>🏝️ Cove</h1>
        <p class="subtitle">island scenes</p>
      </div>
      <nav id="channel-list" aria-label="Channels">
        <div class="loading">Loading scenes…</div>
      </nav>
      <div id="bot-section">
        <div class="sidebar-section-header">
          <span>🤖 Bots</span>
          <button id="add-bot-btn" class="section-add-btn" title="Create bot">+</button>
        </div>
        <div id="bot-list"></div>
      </div>
    </aside>

    <!-- Bot create/edit modal -->
    <div id="bot-modal" class="modal-overlay hidden">
      <div class="modal">
        <div class="modal-header">
          <h3 id="bot-modal-title">Create Bot</h3>
          <button class="modal-close" id="bot-modal-close">×</button>
        </div>
        <form id="bot-form">
          <div class="form-group">
            <label for="bot-username">Name <span class="required">*</span></label>
            <input type="text" id="bot-username" placeholder="e.g. Ruantang" required />
          </div>
          <div class="form-group">
            <label for="bot-avatar">Avatar emoji</label>
            <input type="text" id="bot-avatar" placeholder="🤖" maxlength="4" />
          </div>
          <div class="form-group">
            <label for="bot-bio">Bio</label>
            <input type="text" id="bot-bio" placeholder="A friendly island companion" />
          </div>
          <div class="form-group">
            <label for="bot-backend">Backend</label>
            <select id="bot-backend">
              <option value="openclaw">OpenClaw</option>
              <option value="hermes">Hermes</option>
              <option value="webhook">Webhook</option>
            </select>
          </div>
          <div id="backend-config-fields">
            <div class="form-group" id="field-agent-id">
              <label for="bot-agent-id">Agent ID <span class="hint">OpenClaw agent name, e.g. "kagura"</span></label>
              <input type="text" id="bot-agent-id" placeholder="kagura" />
            </div>
            <div class="form-group hidden" id="field-endpoint">
              <label for="bot-endpoint">Endpoint URL</label>
              <input type="text" id="bot-endpoint" placeholder="https://..." />
            </div>
          </div>
          <div class="form-actions">
            <button type="button" id="bot-cancel" class="btn-secondary">Cancel</button>
            <button type="submit" class="btn-primary">Create</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Bot detail modal -->
    <div id="bot-detail-modal" class="modal-overlay hidden">
      <div class="modal">
        <div class="modal-header">
          <h3 id="bot-detail-title">Bot Details</h3>
          <button class="modal-close" id="bot-detail-close">×</button>
        </div>
        <div id="bot-detail-content"></div>
        <div class="form-actions">
          <button type="button" id="bot-detail-delete" class="btn-danger">Delete Bot</button>
          <button type="button" id="bot-detail-done" class="btn-secondary">Done</button>
        </div>
      </div>
    </div>

    <!-- Overlay for mobile sidebar -->
    <div id="sidebar-overlay"></div>

    <!-- Main chat area -->
    <main id="chat-area">
      <div id="chat-header">
        <span id="channel-icon">🏝️</span>
        <div style="flex:1">
          <h2 id="channel-name">Welcome</h2>
          <p id="channel-topic">Pick a scene to start chatting</p>
        </div>
        <button id="clear-btn" title="Clear messages" style="background:none;border:none;color:var(--text-muted);font-size:18px;cursor:pointer;padding:6px 8px;border-radius:8px;" onclick="">🗑️</button>
      </div>

      <div id="messages">
        <div class="empty-state">
          <span class="empty-emoji">🌴</span>
          <p>Select a scene from the sidebar</p>
        </div>
      </div>

      <form id="message-form" class="hidden">
        <input
          type="text"
          id="message-input"
          placeholder="Say something…"
          autocomplete="off"
          maxlength="2000"
        />
        <button type="submit" id="send-btn" aria-label="Send">➤</button>
      </form>
    </main>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
